<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <alias binding="same">
    <family>Arial Narrow</family>
    <prefer>
      <family>Liberation Sans Narrow</family>
    </prefer>
  </alias>

  <alias binding="same">
    <family>Roboto Medium</family>
    <prefer>
      <family>Roboto</family>
    </prefer>
  </alias>
</fontconfig>
