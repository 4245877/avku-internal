services:
  api:
    image: avku-node:22-bookworm-fonts
    build:
      context: .
      dockerfile: infra/node/Dockerfile
    working_dir: /app/apps/api
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm start"
    environment:
      PORT: "3001"
      CERTIFICATES_STORAGE_ROOT: /data/certificates
      CERTIFICATES_TEMPLATE_DIRECTORY: /app/storage/certificates/templates/volunteer-card-v1
      CERTIFICATES_LEGACY_REGISTRY_PATH: /app/storage/certificates/registry.json
      NODE_OPTIONS: --no-warnings=ExperimentalWarning
    volumes:
      - ./:/app
      - api-node-modules:/app/apps/api/node_modules
      - certificates-data:/data/certificates
    ports:
      - "3001:3001"

  web:
    image: avku-node:22-bookworm-fonts
    build:
      context: .
      dockerfile: infra/node/Dockerfile
    working_dir: /app/apps/web
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_PROXY_TARGET: http://api:3001
    volumes:
      - ./:/app
      - web-node-modules:/app/apps/web/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - api
      - web

volumes:
  certificates-data:
  api-node-modules:
  web-node-modules:
