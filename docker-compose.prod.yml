services:
  api:
    image: avku-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATA_ROOT: /data
      NODE_OPTIONS: --no-warnings=ExperimentalWarning
    volumes:
      - app-data:/data

  web:
    image: avku-node:22-bookworm-fonts
    build:
      context: .
      dockerfile: infra/node/Dockerfile
    working_dir: /app/apps/web
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm run build && pnpm run preview -- --host 0.0.0.0 --port 5173"
    restart: unless-stopped
    environment:
      NODE_ENV: production
    volumes:
      - ./:/app
      - web-node-modules:/app/apps/web/node_modules
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./infra/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - web

volumes:
  app-data:
  web-node-modules:
